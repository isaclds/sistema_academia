<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Diagrama de classes do modelo de domínio, com cores agrupando aluno, catálogo (plano e aula), entidades de relacionamento (matrícula e agendamento) e a enumeração de status</h2>
<style>
#classdiag1c svg.classDiagram .divider path { stroke-opacity: 0.5; }
#classdiag1c svg.classDiagram .row-rect-odd path,
#classdiag1c svg.classDiagram .row-rect-odd rect,
#classdiag1c svg.classDiagram .row-rect-even path,
#classdiag1c svg.classDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="classdiag1c"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;

// Cor única para todas as classes (azul neutro)
const unified = dark ? {fill:'#1e3a5f', stroke:'#6b8fc7', text:'#c0d6f0'} : {fill:'#e6f0fa', stroke:'#2c5a8c', text:'#1e3a5f'};

mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const { svg } = await mermaid.render('classdiag1c-svg', `classDiagram
    class Aluno:::unifiedClass {
        -Long id
        -String nome
        -String cpf
        -String email
        -boolean ativo
    }
    class Plano:::unifiedClass {
        -Long id
        -String nome
        -int duracaoMeses
        -BigDecimal valor
    }
    class Matricula:::unifiedClass {
        -Long id
        -LocalDate dataInicio
        -LocalDate dataVencimento
        -boolean ativa
        +estaVencida() boolean
    }
    class Aula:::unifiedClass {
        -Long id
        -String nome
        -String professor
        -LocalDateTime horario
        -int capacidadeMaxima
    }
    class Agendamento:::unifiedClass {
        -Long id
        -LocalDate dataAgendamento
        -LocalDateTime dataCheckin
        -StatusAgendamento status
    }
    class StatusAgendamento:::unifiedClass {
        <<enumeration>>
        AGENDADO
        PRESENTE
        CANCELADO
    }
    Aluno "1" --> "0..*" Matricula
    Plano "1" --> "0..*" Matricula
    Aluno "1" --> "0..*" Agendamento
    Aula "1" --> "0..*" Agendamento
    Agendamento --> StatusAgendamento

    classDef unifiedClass fill:${unified.fill},stroke:${unified.stroke},color:${unified.text}
`);
document.getElementById('classdiag1c').innerHTML = svg;

document.querySelectorAll('#classdiag1c svg.classDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
</script>
