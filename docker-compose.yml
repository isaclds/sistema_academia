services:
  db:
    image: mysql:latest
    container_name: meumysql
    environment:
      - MYSQL_DATABASE=academia
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_ROOT_HOST=%
      - MYSQL_USER=aluno
      - MYSQL_PASSWORD=aluno
    volumes:
      - ./mysql-data:/var/lib/mysql
    cap_add:
      - SYS_NICE
    ports:
      - 3306:3306
